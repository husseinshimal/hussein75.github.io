<script>
// ====================== الجزء الثاني: الجافاسكريبت ======================
// سيتم وضع الجافاسكريبت هنا
// ====================== البيانات الأساسية ======================
let currentUser = null;
let students = JSON.parse(localStorage.getItem('counselor_students')) || [];
let attendanceRecords = JSON.parse(localStorage.getItem('counselor_attendance')) || [];
let notes = JSON.parse(localStorage.getItem('counselor_notes')) || [];
let rewards = JSON.parse(localStorage.getItem('counselor_rewards')) || [];
let auditLog = JSON.parse(localStorage.getItem('counselor_auditLog')) || [];


let currentScreen = 'dashboard';
let screenHistory = [];


// متغيرات البحث والفلتر (منفصلة عن DOM)
let currentSearchTerm = '';
let currentGradeFilter = '';
let currentBehaviorFilter = '';


// متغير البحث في التقارير
let currentReportSearchTerm = '';


// تصنيفات السلوك والمستوى
const behaviorLabels = {
  excellent: { name: 'ممتاز', class: 'behavior-excellent' },
  good: { name: 'جيد', class: 'behavior-good' },
  average: { name: 'متوسط', class: 'behavior-average' },
  needs_improvement: { name: 'يحتاج تحسين', class: 'behavior-needs-improvement' }
};


const academicLabels = {
  excellent: 'ممتاز (95-100)',
  verygood: 'جيد جداً (85-94)',
  good: 'جيد (75-84)',
  average: 'متوسط (65-74)',
  weak: 'ضعيف (أقل من 65)'
};


// أسماء الأشهر العربية
const monthNames = {
  1: 'كانون الثاني',
  2: 'شباط',
  3: 'آذار',
  4: 'نيسان',
  5: 'أيار',
  6: 'حزيران',
  7: 'تموز',
  8: 'آب',
  9: 'أيلول',
  10: 'تشرين الأول',
  11: 'تشرين الثاني',
  12: 'كانون الأول'
};


// ====================== دوال مساعدة ======================
function saveAllData() {
  localStorage.setItem('counselor_students', JSON.stringify(students));
  localStorage.setItem('counselor_attendance', JSON.stringify(attendanceRecords));
  localStorage.setItem('counselor_notes', JSON.stringify(notes));
  localStorage.setItem('counselor_rewards', JSON.stringify(rewards));
  localStorage.setItem('counselor_auditLog', JSON.stringify(auditLog));
}


function addAuditLog(action, details) {
  auditLog.unshift({
    id: Date.now(),
    user: currentUser?.name || 'زينب',
    action: action,
    details: details,
    timestamp: new Date().toLocaleString('ar-SA')
  });
  if (auditLog.length > 500) auditLog.pop();
  saveAllData();
}


function closeModal(modalId) {
  const modal = document.getElementById(modalId);
  if (modal) modal.classList.remove('show');
}


function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('-translate-x-full');
}


function goBack() {
  if (screenHistory.length > 0) {
    const prev = screenHistory.pop();
    currentScreen = prev;
    showScreen(prev, false);
  }
}


function formatDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  return `${d.getDate()} ${monthNames[d.getMonth() + 1]} ${d.getFullYear()}`;
}


function getMonthName(month) {
  return monthNames[month] || month;
}


// ====================== دوال تسجيل الدخول ======================
function handleLogin() {
  const username = document.getElementById('loginUsername').value;
  const password = document.getElementById('loginPassword').value;
  
  if (username === 'زينب' && password === '1234') {
    currentUser = { id: 1, username: 'زينب', name: 'زينب', role: 'admin', roleName: 'مرشدة طلابية' };
  } else {
    alert('اسم المستخدم أو كلمة المرور غير صحيحة');
    return;
  }
  
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('currentUserName').textContent = currentUser.name;
  document.getElementById('currentUserRole').textContent = currentUser.roleName;
  document.getElementById('userRoleDisplay').textContent = currentUser.roleName;
  
  if (students.length === 0) generateSampleData();
  addAuditLog('تسجيل دخول', 'تم تسجيل الدخول إلى نظام المرشد التربوي');
  showScreen('dashboard');
}


function logout() {
  addAuditLog('تسجيل خروج', 'تم تسجيل الخروج من النظام');
  currentUser = null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
}

// ====================== عرض الشاشات ======================
function showScreen(screen, pushHistory = true) {
  if (pushHistory && currentScreen !== screen) screenHistory.push(currentScreen);
  currentScreen = screen;
  
  document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
  const screenMap = { 'dashboard': 0, 'students': 1, 'attendance': 2, 'notes': 3, 'rewards': 4, 'reports': 5, 'settings': 6 };
  const items = document.querySelectorAll('.sidebar-item');
  if (items[screenMap[screen]]) items[screenMap[screen]].classList.add('active');
  
  const backBtn = document.getElementById('backButton');
  if (screenHistory.length > 0) backBtn.classList.remove('hidden');
  else backBtn.classList.add('hidden');
  
  const titles = {
    'dashboard': 'لوحة التحكم', 'students': 'قائمة الطالبات', 'attendance': 'سجل الغياب والتأخير',
    'notes': 'ملاحظات المرشد', 'rewards': 'الجوائز التحفيزية', 'reports': 'التقارير والإحصائيات',
    'settings': 'الإعدادات'
  };
  document.getElementById('pageTitle').textContent = titles[screen] || '';
  
  const container = document.getElementById('contentArea');
  container.innerHTML = '';
  
  switch(screen) {
    case 'dashboard': renderDashboard(container); break;
    case 'students': renderStudents(container); break;
    case 'attendance': renderAttendance(container); break;
    case 'notes': renderNotes(container); break;
    case 'rewards': renderRewards(container); break;
    case 'reports': renderReports(container); break;
    case 'settings': renderSettings(container); break;
  }
}

function renderStudentsTable() {
  let filtered = students;
  if (currentSearchTerm) filtered = filtered.filter(s => s.name.includes(currentSearchTerm));
  if (currentGradeFilter) filtered = filtered.filter(s => s.grade === currentGradeFilter);
  if (currentBehaviorFilter) filtered = filtered.filter(s => s.behavior === currentBehaviorFilter);
  
  const tbody = document.getElementById('studentsTableBody');
  if (!tbody) return;
  
  tbody.innerHTML = filtered.map(s => {
    return `
      <tr class="hover:bg-gray-50">
        <td class="p-4"><div><p class="font-medium">${s.name}</p></div></td>
        <td class="p-4">${s.grade}</td>
        <td class="p-4">${s.section}</td>
        <td class="p-4"><span class="status-badge bg-blue-50 text-blue-700">${academicLabels[s.academicLevel]}</span></td>
        <td class="p-4"><span class="status-badge ${behaviorLabels[s.behavior].class}">${behaviorLabels[s.behavior].name}</span></td>
        <td class="p-4">${s.parentName || '-'}<br><span class="text-xs text-gray-500">${s.parentPhone || '-'}</span></td>
        <td class="p-4"><div class="flex gap-2"><button onclick="editStudent(${s.id})" class="p-2 text-blue-500 hover:bg-blue-50 rounded"><i class="fas fa-edit"></i></button><button onclick="deleteStudent(${s.id})" class="p-2 text-red-500 hover:bg-red-50 rounded"><i class="fas fa-trash"></i></button></div></td>
      </tr>
    `;
  }).join('');
  
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-message">لا توجد طالبات</td></tr>';
  }
}

// ====================== دوال إدارة الطالبات ======================
function openStudentModal(studentId = null) {
  const modal = document.getElementById('studentModal');
  if (studentId) {
    const student = students.find(s => s.id === studentId);
    if (student) {
      document.getElementById('modalTitle').textContent = 'تعديل بيانات الطالبة';
      document.getElementById('studentId').value = student.id;
      document.getElementById('studentName').value = student.name;
      document.getElementById('studentGrade').value = student.grade;
      document.getElementById('studentSection').value = student.section;
      document.getElementById('studentParentName').value = student.parentName || '';
      document.getElementById('studentParentPhone').value = student.parentPhone || '';
      document.getElementById('studentAcademicLevel').value = student.academicLevel;
      document.getElementById('studentBehavior').value = student.behavior;
      document.getElementById('studentNotes').value = student.notes || '';
    }
  } else {
    document.getElementById('modalTitle').textContent = 'إضافة طالبة جديدة';
    document.getElementById('studentForm').reset();
    document.getElementById('studentId').value = '';
  }
  modal.classList.add('show');
}


function saveStudent(event) {
  event.preventDefault();
  const id = document.getElementById('studentId').value;
  
  const studentData = {
    id: id ? parseInt(id) : Date.now(),
    name: document.getElementById('studentName').value,
    grade: document.getElementById('studentGrade').value,
    section: document.getElementById('studentSection').value,
    parentName: document.getElementById('studentParentName').value,
    parentPhone: document.getElementById('studentParentPhone').value,
    academicLevel: document.getElementById('studentAcademicLevel').value,
    behavior: document.getElementById('studentBehavior').value,
    notes: document.getElementById('studentNotes').value,
    status: 'active'
  };
  
  if (id) {
    const idx = students.findIndex(s => s.id === parseInt(id));
    if (idx !== -1) students[idx] = studentData;
    addAuditLog('تعديل طالبة', `تم تعديل بيانات الطالبة ${studentData.name}`);
  } else {
    students.push(studentData);
    addAuditLog('إضافة طالبة', `تم إضافة طالبة جديدة ${studentData.name}`);
  }
  saveAllData();
  closeModal('studentModal');
  renderStudentsTable();
}


function editStudent(id) { openStudentModal(id); }


function deleteStudent(id) {
  if (confirm('هل أنت متأكدة من حذف هذه الطالبة؟')) {
    const student = students.find(s => s.id === id);
    students = students.filter(s => s.id !== id);
    attendanceRecords = attendanceRecords.filter(a => a.studentId !== id);
    notes = notes.filter(n => n.studentId !== id);
    rewards = rewards.filter(r => r.studentId !== id);
    saveAllData();
    renderStudentsTable();
    addAuditLog('حذف طالبة', `تم حذف الطالبة ${student?.name}`);
  }
}


// ====================== شاشة الغياب والتأخير ======================
function renderAttendance(container) {
  const filterDate = container.dataset.filterDate || new Date().toISOString().split('T')[0];
  let filtered = attendanceRecords;
  if (filterDate) filtered = attendanceRecords.filter(a => a.date === filterDate);
  
  container.innerHTML = `
    <div class="fade-in space-y-6">
      <div class="flex flex-wrap gap-4 justify-between"><div class="flex gap-3"><input type="date" value="${filterDate}" onchange="filterAttendanceByDate(this.value)" class="px-4 py-2 rounded-xl border"><button onclick="openAttendanceModal()" class="btn-primary px-4 py-2 rounded-xl text-white"><i class="fas fa-plus ml-2"></i> تسجيل غياب/تأخير</button></div></div>
      <div class="glass rounded-2xl overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr><th class="p-4">الطالبة</th><th>الصف</th><th>الشعبة</th><th>نوع السجل</th><th>التاريخ</th><th>السبب</th><th>الإجراءات</th></tr></thead><tbody>${filtered.map(a => { const s = students.find(st => st.id === a.studentId); return `<tr><td class="p-4">${s?.name || 'طالبة محذوفة'}</td><td>${s?.grade || '-'}</td><td>${s?.section || '-'}</td><td><span class="status-badge ${a.type === 'absent' ? 'bg-red-100 text-red-700' : a.type === 'late' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'}">${a.type === 'absent' ? 'غياب' : a.type === 'late' ? 'تأخير' : 'غياب بعذر'}</span></td><td>${formatDate(a.date)}</td><td>${a.reason || '-'}</td><td><button onclick="deleteAttendance(${a.id})" class="text-red-500"><i class="fas fa-trash"></i></button></td></tr>`; }).join('')}</tbody>}能用</div>${filtered.length === 0 ? '<div class="empty-message">لا توجد سجلات غياب وتأخير</div>' : ''}
    </div>
  `;
}


function filterAttendanceByDate(date) {
  const content = document.getElementById('contentArea');
  content.dataset.filterDate = date;
  renderAttendance(content);
}


function openAttendanceModal(studentId = null) {
  const modal = document.getElementById('attendanceModal');
  const studentSelect = document.getElementById('attStudentId');
  studentSelect.innerHTML = '<option value="">اختر الطالبة</option>' + students.map(s => `<option value="${s.id}" ${studentId === s.id ? 'selected' : ''}>${s.name} (${s.grade} - ${s.section})</option>`).join('');
  document.getElementById('attDate').value = new Date().toISOString().split('T')[0];
  modal.classList.add('show');
}


function saveAttendanceRecord(event) {
  event.preventDefault();
  const studentId = parseInt(document.getElementById('attStudentId').value);
  if (!studentId) { alert('الرجاء اختيار الطالبة'); return; }
  attendanceRecords.push({ id: Date.now(), studentId, date: document.getElementById('attDate').value, type: document.getElementById('attType').value, minutes: parseInt(document.getElementById('attMinutes').value) || 0, reason: document.getElementById('attReason').value });
  saveAllData();
  closeModal('attendanceModal');
  renderAttendance(document.getElementById('contentArea'));
}


function deleteAttendance(id) {
  if (confirm('هل أنت متأكدة؟')) { attendanceRecords = attendanceRecords.filter(a => a.id !== id); saveAllData(); renderAttendance(document.getElementById('contentArea')); }
}


// ====================== شاشة ملاحظات المرشد ======================
function renderNotes(container) {

}


function openNoteModal(id, name) { document.getElementById('noteStudentId').value = id; document.getElementById('noteStudentName').value = name; document.getElementById('noteText').value = ''; document.getElementById('noteModal').classList.add('show'); }
function saveNote(e) { e.preventDefault(); notes.push({ id: Date.now(), studentId: parseInt(document.getElementById('noteStudentId').value), text: document.getElementById('noteText').value, type: document.getElementById('noteType').value, date: new Date().toLocaleDateString('ar-EG') }); saveAllData(); closeModal('noteModal'); renderNotes(document.getElementById('contentArea')); }
function deleteNote(id) { if (confirm('هل أنت متأكدة؟')) { notes = notes.filter(n => n.id !== id); saveAllData(); renderNotes(document.getElementById('contentArea')); } }


// ====================== شاشة الجوائز التحفيزية ======================
function renderRewards(container) {
  container.innerHTML = `<div class="fade-in space-y-6"><div class="flex justify-between"><h3 class="text-xl font-bold">الجوائز التحفيزية</h3></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${students.map(s => { const studentRewards = rewards.filter(r => r.studentId === s.id); return `<div class="glass rounded-2xl p-4"><div class="flex justify-between items-center mb-3"><div><h4 class="font-bold">${s.name}</h4><p class="text-xs text-gray-500">${s.grade} - ${s.section}</p></div><button onclick="openRewardModal(${s.id}, '${s.name}')" class="btn-primary px-3 py-1 rounded-lg text-white text-sm"><i class="fas fa-gift ml-1"></i> منح</button></div><div class="space-y-2">${studentRewards.map(r => `<div class="flex items-center gap-3 p-2 border-b"><div class="w-8 h-8 bg-yellow-100 rounded-full flex items-center justify-center"><i class="fas fa-trophy text-yellow-600"></i></div><div><p class="font-medium text-sm">${r.reason}</p><p class="text-xs text-gray-500">${r.date}</p></div><button onclick="deleteReward(${r.id})" class="text-red-500"><i class="fas fa-trash"></i></button></div>`).join('') || '<div class="empty-message">لا توجد جوائز</div>'}</div></div>`; }).join('')}</div></div>`;
}


function openRewardModal(id, name) { document.getElementById('rewardStudentId').value = id; document.getElementById('rewardStudentName').value = name; document.getElementById('rewardReason').value = ''; document.getElementById('rewardDate').value = new Date().toISOString().split('T')[0]; document.getElementById('rewardModal').classList.add('show'); }
function saveReward(e) { e.preventDefault(); rewards.push({ id: Date.now(), studentId: parseInt(document.getElementById('rewardStudentId').value), type: document.getElementById('rewardType').value, reason: document.getElementById('rewardReason').value, date: document.getElementById('rewardDate').value }); saveAllData(); closeModal('rewardModal'); renderRewards(document.getElementById('contentArea')); const s = students.find(s => s.id === parseInt(document.getElementById('rewardStudentId').value)); if (rewards.filter(r => r.studentId === s?.id).length >= 3 && s?.behavior !== 'excellent') { s.behavior = 'excellent'; saveAllData(); } }
function deleteReward(id) { if (confirm('هل أنت متأكدة؟')) { rewards = rewards.filter(r => r.id !== id); saveAllData(); renderRewards(document.getElementById('contentArea')); } }


// ====================== شاشة التقارير (مع حقل بحث ثابت) ======================
function renderReportsTable() {
  let filteredStudents = students;
  if (currentReportSearchTerm) {
    filteredStudents = students.filter(s => s.name.includes(currentReportSearchTerm));
  }
  
  const tbody = document.getElementById('reportsTableBody');
  if (!tbody) return;
  
  tbody.innerHTML = filteredStudents.map(s => {
    const absCount = attendanceRecords.filter(a => a.studentId === s.id && a.type === 'absent').length;
    const lateCount = attendanceRecords.filter(a => a.studentId === s.id && a.type === 'late').length;
    return `
      <tr class="border-b cursor-pointer hover:bg-gray-50" onclick="showFullReport(${s.id})">
        <td class="p-3 text-purple-600 font-medium">${s.name}</td>
        <td class="p-3">${s.grade}</td>
        <td class="p-3">${s.section}</td>
        <td class="p-3">${academicLabels[s.academicLevel]}</td>
        <td class="p-3"><span class="status-badge ${behaviorLabels[s.behavior].class}">${behaviorLabels[s.behavior].name}</span></td>
        <td class="p-3 text-red-600">${absCount}</td>
        <td class="p-3 text-orange-600">${lateCount}</td>
      </tr>
    `;
  }).join('');
  
  if (filteredStudents.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-message">لا توجد طالبات مطابقة للبحث</td></tr>';
  }
}


function renderReports(container) {
  const totalStudents = students.length;
  const excellentBehavior = students.filter(s => s.behavior === 'excellent').length;
  const excellentAcademic = students.filter(s => s.academicLevel === 'excellent').length;
  const totalAbsences = attendanceRecords.filter(a => a.type === 'absent').length;
  const totalRewardsCount = rewards.length;
  
  container.innerHTML = `
    <div class="fade-in space-y-6 dashboard-scroll">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="glass rounded-2xl p-6"><p class="text-gray-500">عدد الطالبات</p><h3 class="text-2xl font-bold text-purple-600">${totalStudents}</h3></div>
        <div class="glass rounded-2xl p-6"><p class="text-gray-500">سلوك ممتاز</p><h3 class="text-2xl font-bold text-green-600">${excellentBehavior}</h3></div>
        <div class="glass rounded-2xl p-6"><p class="text-gray-500">مستوى ممتاز</p><h3 class="text-2xl font-bold text-blue-600">${excellentAcademic}</h3></div>
        <div class="glass rounded-2xl p-6"><p class="text-gray-500">إجمالي الجوائز</p><h3 class="text-2xl font-bold text-yellow-600">${totalRewardsCount}</h3></div>
      </div>
      
      <div class="glass rounded-2xl p-6">
        <h3 class="font-bold mb-4">قائمة الطالبات (انقر على الاسم لعرض التقرير المفصل)</h3>
        
        <!-- حقل البحث - ثابت لا يتم إعادة رسمه -->
        <div class="relative mb-4">
          <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" id="reportSearchInput" placeholder="بحث بالاسم..." value="${currentReportSearchTerm}" class="w-full pr-10 pl-4 py-2 rounded-xl border">
        </div>
        
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="p-3 text-right">الاسم</th>
                <th class="p-3 text-right">الصف</th>
                <th class="p-3 text-right">الشعبة</th>
                <th class="p-3 text-right">المستوى العلمي</th>
                <th class="p-3 text-right">السلوك</th>
                <th class="p-3 text-right">عدد الغيابات</th>
                <th class="p-3 text-right">عدد التأخير</th>
              </tr>
            </thead>
            <tbody id="reportsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  `;
  
  // ربط حدث البحث - دون إعادة رسم الحقل
  const searchInput = document.getElementById('reportSearchInput');
  if (searchInput) {
    const newSearchInput = searchInput.cloneNode(true);
    searchInput.parentNode.replaceChild(newSearchInput, searchInput);
    newSearchInput.addEventListener('input', function(e) {
      currentReportSearchTerm = e.target.value;
      renderReportsTable();
    });
  }
  
  // عرض الجدول لأول مرة
  renderReportsTable();
}


// ====================== التقرير الشامل المفصل ======================
function showFullReport(studentId) {
  const s = students.find(s => s.id === studentId);
  if (!s) return;
  
  const studentAttendance = attendanceRecords.filter(a => a.studentId === studentId).sort((a, b) => new Date(b.date) - new Date(a.date));
  const studentNotes = notes.filter(n => n.studentId === studentId);
  const studentRewards = rewards.filter(r => r.studentId === studentId);
  const absences = studentAttendance.filter(a => a.type === 'absent');
  const lates = studentAttendance.filter(a => a.type === 'late');
  
  const monthlyStats = {};
  studentAttendance.forEach(record => {
    if (record.type === 'absent' || record.type === 'excused') {
      const d = new Date(record.date);
      const key = `${d.getFullYear()}-${d.getMonth() + 1}`;
      const name = `${d.getFullYear()} - ${monthNames[d.getMonth() + 1]}`;
      if (!monthlyStats[key]) monthlyStats[key] = { name, count: 0, records: [] };
      monthlyStats[key].count++;
      monthlyStats[key].records.push(record);
    }
  });
  
  document.getElementById('reportContent').innerHTML = `<div id="reportPrintArea"><div class="report-header text-center"><h2 class="text-2xl font-bold">تقرير الطالبة الشامل</h2><p>المرشد التربوي</p><p class="text-sm mt-2">التاريخ: ${new Date().toLocaleDateString('ar-EG')}</p></div><div class="glass rounded-2xl p-5 mb-5"><h3 class="font-bold text-lg mb-4 border-b pb-2">المعلومات الشخصية</h3><div class="info-row"><span class="font-bold">الاسم:</span><span>${s.name}</span></div><div class="info-row"><span class="font-bold">الصف:</span><span>${s.grade} - ${s.section}</span></div><div class="info-row"><span class="font-bold">المستوى العلمي:</span><span>${academicLabels[s.academicLevel]}</span></div><div class="info-row"><span class="font-bold">السلوك:</span><span class="status-badge ${behaviorLabels[s.behavior].class}">${behaviorLabels[s.behavior].name}</span></div></div><div class="glass rounded-2xl p-5 mb-5"><h3 class="font-bold text-lg mb-4 border-b pb-2">معلومات ولي الأمر</h3><div class="info-row"><span class="font-bold">الاسم:</span><span>${s.parentName || '-'}</span></div><div class="info-row"><span class="font-bold">الهاتف:</span><span>${s.parentPhone || '-'}</span></div></div><div class="glass rounded-2xl p-5 mb-5"><h3 class="font-bold text-lg mb-4 border-b pb-2">إحصائيات الحضور</h3><div class="grid grid-cols-3 gap-4 text-center"><div class="p-3 bg-red-50 rounded-xl"><p class="text-2xl font-bold text-red-600">${absences.length}</p><p>غياب</p></div><div class="p-3 bg-orange-50 rounded-xl"><p class="text-2xl font-bold text-orange-600">${lates.length}</p><p>تأخير</p></div></div></div>${Object.keys(monthlyStats).length ? `<div class="glass rounded-2xl p-5 mb-5"><h3 class="font-bold text-lg mb-4 border-b pb-2">تفاصيل الغيابات الشهرية</h3>${Object.values(monthlyStats).map(m => `<div class="mb-3 border rounded-xl"><div class="bg-gray-100 p-2 font-bold">${m.name} (${m.count} غياب)</div>${m.records.map(r => `<div class="flex justify-between p-2 border-b text-sm"><span>${formatDate(r.date)}</span><span class="text-red-600">${r.type === 'absent' ? 'غياب' : 'غياب بعذر'}</span><span>${r.reason || '-'}</span></div>`).join('')}</div>`).join('')}</div>` : ''}<div class="glass rounded-2xl p-5 mb-5"><h3 class="font-bold text-lg mb-4 border-b pb-2">ملاحظات المرشد</h3>${studentNotes.map(n => `<div class="note-card p-2 mb-2"><div class="flex justify-between"><span>${n.date}</span><span class="text-xs ${n.type === 'positive' ? 'text-green-600' : 'text-orange-600'}">${n.type === 'positive' ? 'إيجابية' : 'تنبيه'}</span></div><p>${n.text}</p></div>`).join('') || '<div class="empty-message">لا توجد ملاحظات</div>'}</div><div class="glass rounded-2xl p-5 mb-5"><h3 class="font-bold text-lg mb-4 border-b pb-2">الجوائز التحفيزية</h3>${studentRewards.map(r => `<div class="flex items-center gap-3 p-2 border-b"><div class="w-8 h-8 bg-yellow-100 rounded-full flex items-center justify-center"><i class="fas fa-trophy"></i></div><div><p>${r.reason}</p><p class="text-xs text-gray-500">${r.date}</p></div></div>`).join('') || '<div class="empty-message">لا توجد جوائز</div>'}</div><div class="mt-5 pt-5 text-center border-t"><p>توقيع المرشدة: _________________</p></div></div>`;
  document.getElementById('reportModal').classList.add('show');
}


function exportReportToPDF() { const el = document.getElementById('reportPrintArea'); html2pdf().set({ margin: 10, filename: `تقرير_طالبة_${Date.now()}.pdf`, image: { quality: 0.98 }, html2canvas: { scale: 2 } }).from(el).save(); }


// ====================== شاشة الإعدادات ======================
function renderSettings(container) {
  container.innerHTML = `<div class="fade-in space-y-6"><div class="glass rounded-2xl p-6"><h3 class="font-bold mb-4">الإعدادات</h3><button onclick="exportAllDataToExcel()" class="btn-primary px-6 py-2 rounded-xl text-white mb-3 w-full md:w-auto"><i class="fas fa-file-excel"></i> تصدير الكل إلى Excel</button><button onclick="clearAllData()" class="px-6 py-2 rounded-xl text-white bg-red-600 w-full md:w-auto"><i class="fas fa-trash"></i> حذف جميع البيانات</button><div class="mt-6 p-4 bg-gray-50 rounded-xl"><h4 class="font-bold">الإحصائيات</h4><p>الطالبات: ${students.length}</p><p>سجلات الغياب: ${attendanceRecords.length}</p><p>الملاحظات: ${notes.length}</p><p>الجوائز: ${rewards.length}</p></div></div></div>`;
}


// ====================== دوال التصدير ======================
function exportToExcel() {
  const data = students.map(s => ({ 'الاسم': s.name, 'الصف': s.grade, 'الشعبة': s.section, 'ولي الأمر': s.parentName, 'الهاتف': s.parentPhone, 'المستوى': academicLabels[s.academicLevel], 'السلوك': behaviorLabels[s.behavior].name }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'الطالبات');
  XLSX.writeFile(wb, `الطالبات_${new Date().toISOString().slice(0,10)}.xlsx`);
}


function exportCurrentToPDF() { html2pdf().set({ margin: 10, filename: `تقرير_${new Date().toISOString().slice(0,10)}.pdf` }).from(document.getElementById('contentArea')).save(); }
function exportAllDataToExcel() { exportToExcel(); }
function clearAllData() { if (confirm('تحذير! حذف جميع البيانات؟')) { students = []; attendanceRecords = []; notes = []; rewards = []; saveAllData(); showScreen('dashboard'); } }


window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.classList.remove('show'); };
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') document.querySelectorAll('.modal').forEach(m => m.classList.remove('show')); });


if (students.length === 0) generateSampleData();
</script>
